spring.config.import=optional:file:.env[.properties],optional:file:./user-service/.env[.properties],optional:file:./microservices/user-service/.env[.properties]
spring.application.name=user-service
server.port=${SERVER_PORT:9081}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}

grpc.server.port=${GRPC_SERVER_PORT}
grpc.server.reflection-service-enabled=true
grpc.server.enabled=true

eureka.client.service-url.defaultZone=${SERVICE_EUREKA_URL:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

internal.access-token=${INTERNAL_TOKEN}

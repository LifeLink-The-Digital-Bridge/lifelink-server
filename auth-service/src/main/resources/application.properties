spring.config.import=optional:file:.env[.properties],optional:file:./auth-service/.env[.properties],optional:file:./microservices/auth-service/.env[.properties]
spring.application.name=Auth-Service
server.port=${SERVER_PORT:8000}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

grpc.client.user-service.address=${GRPC_USER_SERVICE}
grpc.client.user-service.negotiationType=plaintext

eureka.client.service-url.defaultZone=${SERVICE_EUREKA_URL:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

internal.access-token=${INTERNAL_TOKEN}

spring.config.import=optional:file:.env[.properties],optional:file:./recipient-service/.env[.properties],optional:file:./microservices/recipient-service/.env[.properties]
spring.application.name=recipient-service
server.port=${SERVER_PORT:8084}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.client-id=${KAFKA_CLIENT_ID}

spring.grpc.client.user-service.address=${GRPC_USER_SERVICE}
spring.grpc.client.user-service.negotiation-type=PLAINTEXT

eureka.client.service-url.defaultZone=${SERVICE_EUREKA_URL:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

internal.access-token=${INTERNAL_TOKEN}

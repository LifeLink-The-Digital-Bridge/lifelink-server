spring.config.import=optional:file:.env[.properties],optional:file:./health-service/.env[.properties],optional:file:./microservices/health-service/.env[.properties]
spring.application.name=health-service
server.port=${SERVER_PORT:8086}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.client-id=${KAFKA_CLIENT_ID}

eureka.client.service-url.defaultZone=${SERVICE_EUREKA_URL:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

internal.access-token=${INTERNAL_TOKEN}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}
health.documents.minio.endpoint=${MINIO_ENDPOINT:http://minio:9000}
health.documents.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
health.documents.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
health.documents.minio.bucket=${MINIO_BUCKET:health-documents}
ml.risk.enabled=${ML_RISK_ENABLED:true}
ml.risk.base-url=${ML_RISK_BASE_URL:http://ml-risk-service:8002}

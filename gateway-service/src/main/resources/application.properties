spring.config.import=optional:file:.env[.properties],optional:file:./gateway-service/.env[.properties],optional:file:./microservices/gateway-service/.env[.properties]
spring.application.name=gateway-service
server.port=${SERVER_PORT}
server.address=${SERVER_ADDRESS}

eureka.client.service-url.defaultZone=${SERVICE_EUREKA_URL}
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[1].id=donor-service
spring.cloud.gateway.routes[1].uri=lb://DONOR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/donors/**

spring.cloud.gateway.routes[2].id=recipient-service
spring.cloud.gateway.routes[2].uri=lb://RECIPIENT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/recipients/**

spring.cloud.gateway.routes[3].id=auth-service
spring.cloud.gateway.routes[3].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[4].id=matching-service
spring.cloud.gateway.routes[4].uri=lb://MATCHING-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/matching/**

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/notifications/**

spring.cloud.gateway.routes[6].id=notification-websocket
spring.cloud.gateway.routes[6].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/ws/**

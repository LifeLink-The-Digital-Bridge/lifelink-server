spring.cloud.gateway.routes[13].id=admin-dashboard-service
spring.cloud.gateway.routes[13].uri=lb://HEALTH-SERVICE
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/admin/**

spring.codec.max-in-memory-size=20MB

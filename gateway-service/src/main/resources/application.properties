spring.cloud.gateway.routes[9].id=migrant-profile-service
spring.cloud.gateway.routes[9].uri=lb://HEALTH-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/migrant-profile/**

spring.cloud.gateway.routes[10].id=health-profile-service
spring.cloud.gateway.routes[10].uri=lb://HEALTH-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/health-profile/**

spring.cloud.gateway.routes[11].id=health-associations-service
